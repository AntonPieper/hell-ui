name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NODE_VERSION: 22

jobs:
  static:
    name: Static contracts
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm run ci:install

      - name: Lint and contract checks
        run: pnpm run ci:test:static

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Restore Angular cache
        uses: actions/cache@v5
        with:
          path: .angular/cache
          key: angular-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'tsconfig*.json', 'apps/*/angular.json', 'apps/**/tsconfig*.json', 'packages/*/angular.json', 'packages/**/tsconfig*.json') }}
          restore-keys: |
            angular-${{ runner.os }}-

      - name: Install
        run: pnpm run ci:install

      - name: Unit tests
        run: pnpm run ci:test:unit

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-unit
          path: |
            test-results/
            coverage/
          if-no-files-found: ignore

  package-consumer:
    name: Package consumer (${{ matrix.group }})
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        # Group names are owned by tools/check-package-consumer.mjs, which
        # asserts every scenario belongs to exactly one group and fails on
        # unknown group names.
        group:
          - core
          - primitive-foundations
          - button
          - composite-foundations
          - audio
          - features
          - table-core
          - table-tanstack-virtual
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Restore Angular cache
        uses: actions/cache@v5
        with:
          path: .angular/cache
          key: angular-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'tsconfig*.json', 'apps/*/angular.json', 'apps/**/tsconfig*.json', 'packages/*/angular.json', 'packages/**/tsconfig*.json') }}
          restore-keys: |
            angular-${{ runner.os }}-

      - name: Install
        run: pnpm run ci:install

      - name: Restore built package cache
        uses: actions/cache@v5
        with:
          path: dist/hell
          key: dist-packages-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'tsconfig*.json', 'packages/angular/**') }}

      - name: Ensure built packages
        run: pnpm run ci:ensure:build:lib

      - name: Package consumer scenario
        env:
          HELL_PACKAGE_CONSUMER_SKIP_BUILD: 1
          HELL_PACKAGE_CONSUMER_GROUP: ${{ matrix.group }}
        run: pnpm run ci:test:package-consumer

  build:
    name: Build and API
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore built package cache
        uses: actions/cache@v5
        with:
          path: dist/hell
          key: dist-packages-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'tsconfig*.json', 'packages/angular/**') }}

      - name: Restore docs cache
        uses: actions/cache@v5
        with:
          path: dist/hell-docs
          key: docs-dist-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'tsconfig*.json', 'packages/angular/**', 'apps/docs/**') }}

      - name: Enable pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Restore Angular cache
        uses: actions/cache@v5
        with:
          path: .angular/cache
          key: angular-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'tsconfig*.json', 'apps/*/angular.json', 'apps/**/tsconfig*.json', 'packages/*/angular.json', 'packages/**/tsconfig*.json') }}
          restore-keys: |
            angular-${{ runner.os }}-

      - name: Install
        run: pnpm run ci:install

      - name: Ensure built packages
        run: pnpm run ci:ensure:build:lib

      - name: Ensure built docs
        run: pnpm run ci:ensure:build:docs

      - name: API report
        run: pnpm run ci:test:api-report:prepared

  e2e:
    name: E2E (shard ${{ matrix.shard }}/9)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6, 7, 8, 9]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Restore Angular cache
        uses: actions/cache@v5
        with:
          path: .angular/cache
          key: angular-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'tsconfig*.json', 'apps/*/angular.json', 'apps/**/tsconfig*.json', 'packages/*/angular.json', 'packages/**/tsconfig*.json') }}
          restore-keys: |
            angular-${{ runner.os }}-

      - name: Install
        run: pnpm run ci:install

      - name: Restore Playwright image cache
        uses: actions/cache@v5
        with:
          path: .ci-cache/playwright-image-v1.59.1-noble.tar
          key: playwright-image-${{ runner.os }}-v1.59.1-noble

      - name: Prepare Playwright image
        run: |
          image="mcr.microsoft.com/playwright:v1.59.1-noble"
          image_tar=".ci-cache/playwright-image-v1.59.1-noble.tar"
          mkdir -p .ci-cache
          if [ -f "${image_tar}" ]; then
            docker load --input "${image_tar}"
          else
            docker pull "${image}"
            docker save --output "${image_tar}" "${image}"
          fi

      - name: Restore docs cache
        uses: actions/cache@v5
        with:
          path: dist/hell-docs
          key: docs-dist-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'tsconfig*.json', 'packages/angular/**', 'apps/docs/**') }}

      - name: Ensure built docs
        run: pnpm run ci:ensure:build:docs

      - name: Start docs server
        run: |
          docs_root="dist/hell-docs/browser"
          if [ ! -f "${docs_root}/index.html" ]; then
            docs_root="dist/hell-docs"
          fi

          test -f "${docs_root}/index.html"
          docker run --detach --name hell-docs \
            --publish 127.0.0.1:4200:80 \
            --volume "${PWD}/${docs_root}:/usr/share/nginx/html:ro" \
            --volume "${PWD}/tools/ci/nginx-spa.conf:/etc/nginx/conf.d/default.conf:ro" \
            nginx:1.27-alpine

      - name: Wait for docs server
        run: |
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent --show-error http://127.0.0.1:4200/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          curl --fail --show-error http://127.0.0.1:4200/

      - name: Browser tests
        env:
          PLAYWRIGHT_SHARD: ${{ matrix.shard }}
        run: |
          docker run --rm --network host \
            --volume "${PWD}:/workspace" \
            --workdir /workspace \
            --env CI=true \
            --env HOME=/root \
            --env PLAYWRIGHT_BROWSERS_PATH=/ms-playwright \
            --env HELL_E2E_BASE_URL=http://127.0.0.1:4200 \
            --env PLAYWRIGHT_SHARD \
            mcr.microsoft.com/playwright:v1.59.1-noble \
            sh -lc 'corepack enable && pnpm run ci:test:e2e --workers=8 --shard="${PLAYWRIGHT_SHARD}/9"'

      - name: Stop docs server
        if: always()
        run: docker rm --force hell-docs || true

      - name: Upload browser reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-shard-${{ matrix.shard }}
          path: |
            test-results/playwright-report.json
            test-results/playwright-html/
            test-results/playwright/
          if-no-files-found: ignore
