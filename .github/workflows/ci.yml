name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
  schedule:
    # Nightly full-matrix run on main (UTC).
    - cron: '30 2 * * *'
  workflow_dispatch:
    inputs:
      e2e-tier:
        description: Browser-risk tier for the E2E jobs (playwright.config.ts)
        type: choice
        options:
          - pr
          - main
          - full
        default: full

permissions:
  contents: read

# The event name keeps the nightly schedule and pushes to main (same ref) from
# cancelling each other.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NODE_VERSION: 22

jobs:
  static:
    name: Static contracts
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm run ci:install

      - name: Lint and contract checks
        run: pnpm run ci:test:static

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Restore Angular cache
        uses: actions/cache@v5
        with:
          path: .angular/cache
          key: angular-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'tsconfig*.json', 'apps/*/angular.json', 'apps/**/tsconfig*.json', 'packages/*/angular.json', 'packages/**/tsconfig*.json') }}
          restore-keys: |
            angular-${{ runner.os }}-

      - name: Install
        run: pnpm run ci:install

      - name: Unit tests
        run: pnpm run ci:test:unit

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-unit
          path: coverage/
          if-no-files-found: ignore

  package-consumer:
    name: Package consumer (${{ matrix.group }})
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        # Group names are owned by tools/check-package-consumer.mjs, which
        # asserts every scenario belongs to exactly one group and fails on
        # unknown group names. The extra "fixtures" group runs the checked-in
        # consumer fixtures via tools/check-consumer-fixtures.mjs instead.
        group:
          - fixtures
          - core
          - primitive-foundations
          - button
          - composite-foundations
          - audio
          - features
          - table-core
          - table-tanstack-virtual
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm run ci:install

      # Consumers test the exact tarball the build job audited and uploaded;
      # nothing is rebuilt or restored from a cache here.
      - name: Download package tarball
        uses: actions/download-artifact@v8
        with:
          name: package-tarball
          path: artifacts/package

      - name: Package consumer scenario
        if: matrix.group != 'fixtures'
        env:
          HELL_PACKAGE_CONSUMER_TARBALL: artifacts/package
          HELL_PACKAGE_CONSUMER_GROUP: ${{ matrix.group }}
        run: pnpm run ci:test:package-consumer

      # The fixture smoke loads the built consumer app in headless chromium.
      - name: Install Playwright chromium
        if: matrix.group == 'fixtures'
        run: pnpm run ci:playwright:chromium

      - name: Consumer fixtures
        if: matrix.group == 'fixtures'
        env:
          HELL_PACKAGE_CONSUMER_TARBALL: artifacts/package
          HELL_CONSUMER_FIXTURE_SMOKE: 1
        run: pnpm run ci:test:consumer-fixtures

  # Single producer of built output: every run builds the library and docs
  # fresh, audits and packs the tarball, and uploads both as immutable run
  # artifacts. dist/ is never stored in or restored from an actions cache.
  build:
    name: Build and API
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Restore Angular cache
        uses: actions/cache@v5
        with:
          path: .angular/cache
          key: angular-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'tsconfig*.json', 'apps/*/angular.json', 'apps/**/tsconfig*.json', 'packages/*/angular.json', 'packages/**/tsconfig*.json') }}
          restore-keys: |
            angular-${{ runner.os }}-

      - name: Install
        run: pnpm run ci:install

      - name: Assert fresh build outputs
        run: |
          test ! -e dist
          test ! -e artifacts

      - name: Check entrypoint manifests
        run: pnpm run ci:check:entrypoints

      - name: Build packages
        run: pnpm run ci:build:lib

      - name: API report
        run: pnpm run ci:test:api-report:prepared

      - name: Audit and pack package tarball
        run: pnpm run ci:pack:lib

      - name: Build docs
        run: pnpm run ci:build:docs:prepared

      - name: Upload package tarball
        uses: actions/upload-artifact@v7
        with:
          name: package-tarball
          path: artifacts/package/*.tgz
          if-no-files-found: error

      - name: Upload docs dist
        uses: actions/upload-artifact@v7
        with:
          name: docs-dist
          path: dist/hell-docs/
          if-no-files-found: error

  # Browser-risk tiers (#265): the tier and shard count follow the triggering
  # event. playwright.config.ts owns what each tier runs (HELL_E2E_TIER);
  # shard counts keep the per-shard test load roughly constant across tiers.
  e2e-plan:
    name: E2E plan
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      tier: ${{ steps.plan.outputs.tier }}
      shard-total: ${{ steps.plan.outputs.shard-total }}
      shards: ${{ steps.plan.outputs.shards }}
    steps:
      - name: Resolve browser-risk tier
        id: plan
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          DISPATCH_TIER: ${{ inputs.e2e-tier }}
        run: |
          case "${EVENT_NAME}" in
            pull_request) tier="pr" ;;
            push)
              if [ "${REF_TYPE}" = "tag" ]; then tier="full"; else tier="main"; fi
              ;;
            schedule) tier="full" ;;
            workflow_dispatch) tier="${DISPATCH_TIER:-full}" ;;
            *)
              echo "Unexpected event ${EVENT_NAME}" >&2
              exit 1
              ;;
          esac

          case "${tier}" in
            pr) total=3 ;;
            main) total=6 ;;
            full) total=9 ;;
            *)
              echo "Unknown tier ${tier}" >&2
              exit 1
              ;;
          esac

          {
            echo "tier=${tier}"
            echo "shard-total=${total}"
            echo "shards=[$(seq 1 "${total}" | paste -sd, -)]"
          } >> "$GITHUB_OUTPUT"

  e2e:
    name: E2E ${{ needs.e2e-plan.outputs.tier }} (shard ${{ matrix.shard }}/${{ needs.e2e-plan.outputs.shard-total }})
    runs-on: ubuntu-latest
    needs: [build, e2e-plan]
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(needs.e2e-plan.outputs.shards) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm run ci:install

      - name: Restore Playwright image cache
        uses: actions/cache@v5
        with:
          path: .ci-cache/playwright-image-v1.59.1-noble.tar
          key: playwright-image-${{ runner.os }}-v1.59.1-noble

      - name: Prepare Playwright image
        run: |
          image="mcr.microsoft.com/playwright:v1.59.1-noble"
          image_tar=".ci-cache/playwright-image-v1.59.1-noble.tar"
          mkdir -p .ci-cache
          if [ -f "${image_tar}" ]; then
            docker load --input "${image_tar}"
          else
            docker pull "${image}"
            docker save --output "${image_tar}" "${image}"
          fi

      # E2E serves the exact docs artifact the build job produced; nothing is
      # rebuilt or restored from a cache here.
      - name: Download docs dist
        uses: actions/download-artifact@v8
        with:
          name: docs-dist
          path: dist/hell-docs

      - name: Start docs server
        run: |
          docs_root="dist/hell-docs/browser"
          if [ ! -f "${docs_root}/index.html" ]; then
            docs_root="dist/hell-docs"
          fi

          test -f "${docs_root}/index.html"
          docker run --detach --name hell-docs \
            --publish 127.0.0.1:4200:80 \
            --volume "${PWD}/${docs_root}:/usr/share/nginx/html:ro" \
            --volume "${PWD}/tools/ci/nginx-spa.conf:/etc/nginx/conf.d/default.conf:ro" \
            nginx:1.27-alpine

      - name: Wait for docs server
        run: |
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent --show-error http://127.0.0.1:4200/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          curl --fail --show-error http://127.0.0.1:4200/

      - name: Browser tests
        env:
          HELL_E2E_TIER: ${{ needs.e2e-plan.outputs.tier }}
          PLAYWRIGHT_SHARD: ${{ matrix.shard }}
          PLAYWRIGHT_SHARD_TOTAL: ${{ needs.e2e-plan.outputs.shard-total }}
        run: |
          docker run --rm --network host \
            --volume "${PWD}:/workspace" \
            --workdir /workspace \
            --env CI=true \
            --env HOME=/root \
            --env PLAYWRIGHT_BROWSERS_PATH=/ms-playwright \
            --env HELL_E2E_BASE_URL=http://127.0.0.1:4200 \
            --env HELL_E2E_TIER \
            --env PLAYWRIGHT_SHARD \
            --env PLAYWRIGHT_SHARD_TOTAL \
            mcr.microsoft.com/playwright:v1.59.1-noble \
            sh -lc 'corepack enable && pnpm run ci:test:e2e --workers=8 --shard="${PLAYWRIGHT_SHARD}/${PLAYWRIGHT_SHARD_TOTAL}"'

      - name: Stop docs server
        if: always()
        run: docker rm --force hell-docs || true

      - name: Upload browser reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-shard-${{ matrix.shard }}
          path: |
            test-results/playwright-html/
            test-results/playwright/
          if-no-files-found: ignore

  # Stable required-check context (#265): the shard job names embed the tier
  # and shard count ("E2E pr (shard 1/3)", "E2E main (shard 4/6)", ...), so
  # branch protection cannot pin per-shard contexts without breaking on every
  # tier or shard change. Rulesets pin this single "E2E" gate instead. It runs
  # on every outcome (if: always()) and fails unless the plan and every planned
  # shard succeeded, so a failed, cancelled, or skipped shard can never slip
  # past as a missing check.
  e2e-gate:
    name: E2E
    runs-on: ubuntu-latest
    needs: [e2e-plan, e2e]
    if: always()
    timeout-minutes: 2
    steps:
      - name: Assert every E2E shard succeeded
        env:
          PLAN_RESULT: ${{ needs.e2e-plan.result }}
          SHARDS_RESULT: ${{ needs.e2e.result }}
        run: |
          echo "e2e-plan: ${PLAN_RESULT}"
          echo "e2e shards: ${SHARDS_RESULT}"
          if [ "${PLAN_RESULT}" = "success" ] && [ "${SHARDS_RESULT}" = "success" ]; then
            exit 0
          fi
          echo "E2E gate failed: an upstream E2E job did not succeed." >&2
          exit 1
