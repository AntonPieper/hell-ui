name: Publish to GitHub Packages

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-packages-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  CI: true
  NODE_VERSION: 24

jobs:
  build-package:
    name: Build audited packages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install
        run: pnpm run ci:install

      - name: Build packages
        run: pnpm run build:lib

      - name: Audit package contents
        run: pnpm run test:package-pack

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          version="$(node -p "require('./dist/hell/package.json').version")"
          test "${GITHUB_REF_NAME}" = "v${version}" || {
            echo "Tag ${GITHUB_REF_NAME} must match dist/hell/package.json version v${version}."
            exit 1
          }

      # GitHub Packages scopes npm packages to the owning GitHub account, and
      # the @hell-ui GitHub user is unrelated to this repository, so the
      # GitHub Packages mirror publishes under the repository owner's scope.
      # publishConfig and name are rewritten before pack so the tarball's
      # manifest targets GitHub Packages, and pack runs inside the workspace
      # so pnpm resolves catalog: dependency specifiers to concrete versions.
      # Internal @hell-ui/* peer/import names are untouched; consumers install
      # the mirror through npm aliases (see docs/release/npm-publishing.md).
      - name: Pack package for GitHub Packages
        run: |
          set -euo pipefail
          mkdir -p ghpr-package
          node -e '
            const fs = require("node:fs");
            const path = "dist/hell/package.json";
            const pkg = JSON.parse(fs.readFileSync(path, "utf8"));
            pkg.name = "@antonpieper/hell-ui-angular";
            pkg.publishConfig = { registry: "https://npm.pkg.github.com" };
            fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + "\n");
          '
          pnpm --dir ./dist/hell pack --pack-destination ../../ghpr-package

      - name: Upload GitHub Packages tarballs
        uses: actions/upload-artifact@v4
        with:
          name: github-packages-tarballs
          path: ghpr-package/*.tgz
          if-no-files-found: error
          retention-days: 7

  publish-github-packages:
    name: Publish packages
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build-package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download GitHub Packages tarballs
        uses: actions/download-artifact@v4
        with:
          name: github-packages-tarballs
          path: ghpr-package

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false

      - name: Setup Node for GitHub Packages
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://npm.pkg.github.com

      - name: Publish packages
        env:
          # The mirror publishes under the repository owner's scope, so the
          # default workflow token has packages:write for the namespace.
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Absolute paths: pnpm publish re-resolves a relative tarball path
          # from a different working directory and misreads it as a git spec.
          for tarball in "$PWD"/ghpr-package/*.tgz; do
            echo "Publishing ${tarball}"
            pnpm publish "$tarball" --no-git-checks
          done
