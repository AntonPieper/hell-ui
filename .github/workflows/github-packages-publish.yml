name: Publish to GitHub Packages

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-packages-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  CI: true
  NODE_VERSION: 24

jobs:
  build-package:
    name: Build audited packages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install
        run: pnpm run ci:install

      - name: Build packages
        run: pnpm run build:lib

      - name: Audit package contents
        run: pnpm run test:package-pack

      - name: Verify tag matches package versions
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          for manifest in dist/hell/package.json dist/hell-pdf-viewer/package.json; do
            version="$(node -p "require('./${manifest}').version")"
            test "${GITHUB_REF_NAME}" = "v${version}" || {
              echo "Tag ${GITHUB_REF_NAME} must match ${manifest} version v${version}."
              exit 1
            }
          done

      - name: Upload built packages
        uses: actions/upload-artifact@v4
        with:
          name: github-packages-dist
          path: |
            dist/hell
            dist/hell-pdf-viewer
          if-no-files-found: error
          retention-days: 7

  publish-github-packages:
    name: Publish packages
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build-package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download built packages
        uses: actions/download-artifact@v4
        with:
          name: github-packages-dist
          path: dist

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false

      - name: Setup Node for GitHub Packages
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://npm.pkg.github.com

      - name: Point packages at GitHub Packages
        run: |
          set -euo pipefail
          for dir in dist/hell dist/hell-pdf-viewer; do
            node -e '
              const fs = require("node:fs");
              const path = process.argv[1] + "/package.json";
              const pkg = JSON.parse(fs.readFileSync(path, "utf8"));
              pkg.publishConfig = { registry: "https://npm.pkg.github.com" };
              fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + "\n");
            ' "$dir"
          done

      - name: Publish packages
        env:
          # Falls back to the workflow token; @hell-ui-scoped publishes need a
          # packages:write token from the account owning the hell-ui namespace.
          NODE_AUTH_TOKEN: ${{ secrets.HELL_UI_GITHUB_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          pnpm --dir dist/hell publish --no-git-checks
          pnpm --dir dist/hell-pdf-viewer publish --no-git-checks
