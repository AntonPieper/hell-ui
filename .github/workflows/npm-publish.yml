name: Publish npm packages

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  CI: true
  NODE_VERSION: 24

jobs:
  release-gate:
    name: Release gate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install
        run: pnpm run ci:install

      # The package-consumer runtime style check launches a headless chromium
      # (HELL_PACKAGE_CONSUMER_RUNTIME_STYLE_CHECK=1).
      - name: Install Playwright chromium
        run: pnpm run ci:playwright:chromium

      - name: Changelog entry
        run: pnpm run test:changelog

      - name: Lint
        run: pnpm run lint

      - name: Architecture
        run: pnpm run test:architecture

      - name: Unit tests
        run: pnpm run test:unit

      - name: Build library
        run: pnpm run build:lib

      - name: Pack audit
        run: pnpm run test:package-pack

      - name: Package consumer scenarios
        env:
          HELL_PACKAGE_CONSUMER_SKIP_BUILD: 1
          HELL_PACKAGE_CONSUMER_RUNTIME_STYLE_CHECK: 1
        run: pnpm run test:package-consumer -- --minimal-deps

      - name: API report
        run: pnpm run test:api-report

      - name: Build docs
        run: pnpm run build:docs

  build-package:
    name: Build audited packages
    needs: release-gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install
        run: pnpm run ci:install

      - name: Build packages
        run: pnpm run build:lib

      - name: Audit package contents
        run: pnpm run test:package-pack

      - name: Pack audited package
        run: |
          mkdir -p release-package
          pnpm --dir ./dist/hell pack --pack-destination ../../release-package

      - name: Upload package tarballs
        uses: actions/upload-artifact@v4
        with:
          name: release-package
          path: release-package/*.tgz
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish to npm
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && vars.HELL_ENABLE_NPMJS_PUBLISH == 'true'
    needs: [release-gate, build-package]
    runs-on: ubuntu-latest
    environment: npm-publish
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download package tarballs
        uses: actions/download-artifact@v4
        with:
          name: release-package
          path: release-package

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false

      - name: Setup Node for npm trusted publishing
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org

      - name: Verify package tarball and tag
        run: |
          set -euo pipefail
          tarball_count="$(find release-package -type f -name '*.tgz' | wc -l | tr -d ' ')"
          test "$tarball_count" = "1"

          # Absolute path: pnpm publish re-resolves a relative tarball path
          # from a different working directory and misreads it as a git spec.
          tarball="$(find "$PWD/release-package" -type f -name '*.tgz' -print -quit)"
          echo "HELL_RELEASE_TARBALL=${tarball}" >> "$GITHUB_ENV"

          package_name="$(tar -xOf "$tarball" package/package.json | node -e "let data = ''; process.stdin.on('data', (chunk) => data += chunk); process.stdin.on('end', () => console.log(JSON.parse(data).name));")"
          package_version="$(tar -xOf "$tarball" package/package.json | node -e "let data = ''; process.stdin.on('data', (chunk) => data += chunk); process.stdin.on('end', () => console.log(JSON.parse(data).version));")"
          test "${GITHUB_REF_NAME}" = "v${package_version}" || {
            echo "Tag ${GITHUB_REF_NAME} must match ${package_name} version v${package_version}."
            exit 1
          }
          test "$package_name" = "@hell-ui/angular" || {
            echo "Unexpected release tarball package: ${package_name}."
            exit 1
          }

      - name: Publish npm package
        run: |
          set -euo pipefail
          echo "Publishing @hell-ui/angular"
          pnpm publish "$HELL_RELEASE_TARBALL" --access public --provenance --no-git-checks
