name: Publish npm package

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  CI: true
  NODE_VERSION: 24

jobs:
  release-dry-run:
    name: Release dry-run evidence
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install
        run: node tools/package-manager.mjs run ci:install

      - name: Run release dry-run
        run: node tools/package-manager.mjs run release:dry-run -- --full

      - name: Upload release dry-run evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-dry-run-evidence
          path: test-results/release-evidence/
          if-no-files-found: error
          retention-days: 30

  build-package:
    name: Build audited package
    needs: release-dry-run
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install
        run: node tools/package-manager.mjs run ci:install

      - name: Build package
        run: node tools/package-manager.mjs run build:lib

      - name: Audit package contents
        run: node tools/package-manager.mjs run test:package-pack

      - name: Pack audited package
        run: |
          mkdir -p release-package
          npm pack ./dist/hell --pack-destination release-package

      - name: Upload package tarball
        uses: actions/upload-artifact@v4
        with:
          name: release-package
          path: release-package/*.tgz
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish to npm
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [release-dry-run, build-package]
    runs-on: ubuntu-latest
    environment: npm-publish
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download release dry-run evidence
        uses: actions/download-artifact@v4
        with:
          name: release-dry-run-evidence
          path: release-dry-run-evidence

      - name: Download package tarball
        uses: actions/download-artifact@v4
        with:
          name: release-package
          path: release-package

      - name: Setup Node for npm trusted publishing
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org

      - name: Verify release dry-run evidence
        run: |
          set -euo pipefail
          evidence="$(find release-dry-run-evidence -type f -name 'release-dry-run-*.log' -print -quit)"
          test -n "$evidence"
          summary_exit="$(awk '/^## Summary$/{in_summary=1; next} in_summary && /^Exit: /{print $2; exit}' "$evidence")"
          test "$summary_exit" = "0"

      - name: Verify package tarball and tag
        run: |
          set -euo pipefail
          tarball_count="$(find release-package -type f -name '*.tgz' | wc -l | tr -d ' ')"
          test "$tarball_count" = "1"
          tarball="$(find release-package -type f -name '*.tgz' -print -quit)"
          package_version="$(tar -xOf "$tarball" package/package.json | node -e "let data = ''; process.stdin.on('data', (chunk) => data += chunk); process.stdin.on('end', () => console.log(JSON.parse(data).version));")"
          test "${GITHUB_REF_NAME}" = "v${package_version}" || {
            echo "Tag ${GITHUB_REF_NAME} must match @hell-ui/angular version v${package_version}."
            exit 1
          }
          echo "HELL_RELEASE_TARBALL=$tarball" >> "$GITHUB_ENV"

      - name: Publish @hell-ui/angular
        run: npm publish "$HELL_RELEASE_TARBALL" --access public --provenance
