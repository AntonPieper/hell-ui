name: Publish npm packages

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  CI: true
  # Publish-only runtime: the tarball is built by the shared release gate on
  # the CI Node runtime (release-gate.yml). Node 24 here keeps npm trusted
  # publishing (OIDC provenance) available for the publish command itself.
  NODE_VERSION: 24

jobs:
  release-gate:
    name: Release gate
    uses: ./.github/workflows/release-gate.yml

  publish:
    name: Publish to npm
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && vars.HELL_ENABLE_NPMJS_PUBLISH == 'true'
    needs: release-gate
    runs-on: ubuntu-latest
    environment: npm-publish
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download package tarball
        uses: actions/download-artifact@v8
        with:
          name: release-package
          path: release-package

      - name: Enable pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.2
          run_install: false

      - name: Setup Node for npm trusted publishing
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org

      - name: Verify package tarball and tag
        run: |
          set -euo pipefail
          tarball_count="$(find release-package -type f -name '*.tgz' | wc -l | tr -d ' ')"
          test "$tarball_count" = "1"

          # Absolute path: pnpm publish re-resolves a relative tarball path
          # from a different working directory and misreads it as a git spec.
          tarball="$(find "$PWD/release-package" -type f -name '*.tgz' -print -quit)"
          echo "HELL_RELEASE_TARBALL=${tarball}" >> "$GITHUB_ENV"

          package_name="$(tar -xOf "$tarball" package/package.json | node -e "let data = ''; process.stdin.on('data', (chunk) => data += chunk); process.stdin.on('end', () => console.log(JSON.parse(data).name));")"
          package_version="$(tar -xOf "$tarball" package/package.json | node -e "let data = ''; process.stdin.on('data', (chunk) => data += chunk); process.stdin.on('end', () => console.log(JSON.parse(data).version));")"
          test "${GITHUB_REF_NAME}" = "v${package_version}" || {
            echo "Tag ${GITHUB_REF_NAME} must match ${package_name} version v${package_version}."
            exit 1
          }
          test "$package_name" = "@hell-ui/angular" || {
            echo "Unexpected release tarball package: ${package_name}."
            exit 1
          }

      - name: Publish npm package
        run: |
          set -euo pipefail
          echo "Publishing @hell-ui/angular"
          pnpm publish "$HELL_RELEASE_TARBALL" --access public --provenance --no-git-checks
