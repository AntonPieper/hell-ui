name: Publish npm packages

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  CI: true
  NODE_VERSION: 24

jobs:
  release-dry-run:
    name: Release dry-run evidence
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install
        run: pnpm run ci:install

      # The full dry-run's package-consumer runtime style check launches a
      # headless chromium (HELL_PACKAGE_CONSUMER_RUNTIME_STYLE_CHECK=1).
      - name: Install Playwright chromium
        run: pnpm run ci:playwright:chromium

      - name: Run release dry-run
        run: pnpm run release:dry-run -- --full

      - name: Upload release dry-run evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-dry-run-evidence
          path: test-results/release-evidence/
          if-no-files-found: error
          retention-days: 30

  build-package:
    name: Build audited packages
    needs: release-dry-run
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install
        run: pnpm run ci:install

      - name: Build packages
        run: pnpm run build:lib

      - name: Audit package contents
        run: pnpm run test:package-pack

      - name: Pack audited packages
        run: |
          mkdir -p release-package
          pnpm --dir ./dist/hell pack --pack-destination ../../release-package
          pnpm --dir ./dist/hell-pdf-viewer pack --pack-destination ../../release-package

      - name: Upload package tarballs
        uses: actions/upload-artifact@v4
        with:
          name: release-package
          path: release-package/*.tgz
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish to npm
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && vars.HELL_ENABLE_NPMJS_PUBLISH == 'true'
    needs: [release-dry-run, build-package]
    runs-on: ubuntu-latest
    environment: npm-publish
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download release dry-run evidence
        uses: actions/download-artifact@v4
        with:
          name: release-dry-run-evidence
          path: release-dry-run-evidence

      - name: Download package tarballs
        uses: actions/download-artifact@v4
        with:
          name: release-package
          path: release-package

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false

      - name: Setup Node for npm trusted publishing
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org

      - name: Verify release dry-run evidence
        run: |
          set -euo pipefail
          evidence="$(find release-dry-run-evidence -type f -name 'release-dry-run-*.log' -print -quit)"
          test -n "$evidence"
          summary_exit="$(awk '/^## Summary$/{in_summary=1; next} in_summary && /^Exit: /{print $2; exit}' "$evidence")"
          test "$summary_exit" = "0"

      - name: Verify package tarballs and tag
        run: |
          set -euo pipefail
          tarball_count="$(find release-package -type f -name '*.tgz' | wc -l | tr -d ' ')"
          test "$tarball_count" = "2"

          seen_angular=0
          seen_pdf=0
          # Absolute paths: pnpm publish re-resolves a relative tarball path
          # from a different working directory and misreads it as a git spec.
          {
            echo 'HELL_RELEASE_TARBALLS<<EOF'
            find "$PWD/release-package" -type f -name '*.tgz' | sort
            echo 'EOF'
          } >> "$GITHUB_ENV"

          while IFS= read -r tarball; do
            package_name="$(tar -xOf "$tarball" package/package.json | node -e "let data = ''; process.stdin.on('data', (chunk) => data += chunk); process.stdin.on('end', () => console.log(JSON.parse(data).name));")"
            package_version="$(tar -xOf "$tarball" package/package.json | node -e "let data = ''; process.stdin.on('data', (chunk) => data += chunk); process.stdin.on('end', () => console.log(JSON.parse(data).version));")"
            test "${GITHUB_REF_NAME}" = "v${package_version}" || {
              echo "Tag ${GITHUB_REF_NAME} must match ${package_name} version v${package_version}."
              exit 1
            }
            case "$package_name" in
              '@hell-ui/angular') seen_angular=1 ;;
              '@hell-ui/pdf-viewer') seen_pdf=1 ;;
              *)
                echo "Unexpected release tarball package: ${package_name}."
                exit 1
                ;;
            esac
          done < <(find "$PWD/release-package" -type f -name '*.tgz' | sort)

          test "$seen_angular" = "1"
          test "$seen_pdf" = "1"

      - name: Publish npm packages
        run: |
          set -euo pipefail
          while IFS= read -r tarball; do
            package_name="$(tar -xOf "$tarball" package/package.json | node -e "let data = ''; process.stdin.on('data', (chunk) => data += chunk); process.stdin.on('end', () => console.log(JSON.parse(data).name));")"
            echo "Publishing ${package_name}"
            pnpm publish "$tarball" --access public --provenance --no-git-checks
          done <<< "$HELL_RELEASE_TARBALLS"
