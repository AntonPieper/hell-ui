- button "Previous year" [disabled]
- button "Previous month" [disabled]
- heading /April \d+/ [level=2]
- button "Next month"
- button "Next year" [disabled]
- grid /April \d+/:
  - rowgroup:
    - row "S M T W T F S":
      - columnheader "S"
      - columnheader "M"
      - columnheader "T"
      - columnheader "W"
      - columnheader "T"
      - columnheader "F"
      - columnheader "S"
  - rowgroup:
    - row /\d+ \d+ \d+ 1 2 3 4/:
      - gridcell /\d+/ [disabled]:
        - button /\d+/ [disabled]
      - gridcell /\d+/ [disabled]:
        - button /\d+/ [disabled]
      - gridcell /\d+/ [disabled]:
        - button /\d+/ [disabled]
      - gridcell "1":
        - button "1"
      - gridcell "2":
        - button "2"
      - gridcell "3":
        - button "3"
      - gridcell "4":
        - button "4"
    - row /5 6 7 8 9 \d+ \d+/:
      - gridcell "5":
        - button "5"
      - gridcell "6":
        - button "6"
      - gridcell "7":
        - button "7"
      - gridcell "8":
        - button "8"
      - gridcell "9":
        - button "9"
      - gridcell /\d+/:
        - button /\d+/
      - gridcell /\d+/:
        - button /\d+/
    - row /\d+ \d+ \d+ \d+ \d+ \d+ \d+/:
      - gridcell /\d+/:
        - button /\d+/
      - gridcell /\d+/:
        - button /\d+/
      - gridcell /\d+/:
        - button /\d+/
      - gridcell /\d+/:
        - button /\d+/
      - gridcell /\d+/:
        - button /\d+/
      - gridcell /\d+/:
        - button /\d+/
      - gridcell /\d+/:
        - button /\d+/
    - row /\d+ \d+ \d+ \d+ \d+ \d+ \d+/:
      - gridcell /\d+/:
        - button /\d+/
      - gridcell /\d+/:
        - button /\d+/
      - gridcell /\d+/:
        - button /\d+/
      - gridcell /\d+/:
        - button /\d+/
      - gridcell /\d+/:
        - button /\d+/
      - gridcell /\d+/:
        - button /\d+/
      - gridcell /\d+/:
        - button /\d+/
    - row /\d+ \d+ \d+ \d+ \d+ 1 2/:
      - gridcell /\d+/:
        - button /\d+/
      - gridcell /\d+/:
        - button /\d+/
      - gridcell /\d+/:
        - button /\d+/
      - gridcell /\d+/:
        - button /\d+/
      - gridcell /\d+/:
        - button /\d+/
      - gridcell "1":
        - button "1"
      - gridcell "2":
        - button "2"