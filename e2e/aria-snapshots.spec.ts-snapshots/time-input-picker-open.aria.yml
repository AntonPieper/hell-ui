- dialog:
  - text: /\d+:\d+ Hours/
  - spinbutton "Hours": /\d+/
  - button "Decrease hours": −
  - button "Increase hours": +
  - text: Minutes
  - spinbutton "Minutes": /\d+/
  - button "Decrease minutes": −
  - button "Increase minutes": +
  - group "Minute presets":
    - button "Set minutes to 00": "00"
    - button "Set minutes to 15": "15"
    - button "Set minutes to 30" [pressed]: "30"
    - button "Set minutes to 45": "45"
