overrides:
  # Patched transitive versions for the current build and test toolchains.
  '@babel/core@<=7.29.0': '>=7.29.6'
  "@phenomnomnominal/tsquery": "6.2.0"
  '@sigstore/core@<=3.2.0': '>=3.2.1'
  '@sigstore/verify@=3.1.0': '>=3.1.1'
  brace-expansion@>=5.0.0 <5.0.6: '>=5.0.6'
  esbuild@>=0.27.3 <0.28.1: '>=0.28.1'
  # GHSA-q3j6-qgpj-74h6 / GHSA-v39h-62p7-jpjc: force patched fast-uri in the
  # @angular-devkit/schematics -> ajv chain until upstream bumps it.
  "fast-uri": ">=3.1.2"
  hono@<4.12.25: '>=4.12.25'
  ip-address@<=10.1.0: '>=10.1.1'
  qs@>=6.11.1 <=6.15.1: '>=6.15.2'
  sigstore@<=4.1.0: '>=4.1.1'
  tar@<=7.5.15: '>=7.5.16'
  undici: 7.28.0
packageExtensions:
  # ng-primitives/dialog imports @angular/router without declaring the peer.
  ng-primitives:
    peerDependencies:
      "@angular/router": ">=19.0.0"
