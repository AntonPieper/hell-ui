kind: Breaking
body: >-
  Combobox is one projection-first interaction state machine. The owned
  `<hell-combobox-basic>` renderer and its options/display/search/status model
  are removed; consumers project domain objects through `[hellCombobox]`,
  `hellComboboxInput`, `hellComboboxOption`, `hellComboboxDropdown`, and
  `hellComboboxPortal`, compose the core Search Resource for local ranking or
  asynchronous results, and compose Chip Set/Chip Input for editable multiple
  values. Forms, comparison, value semantics, keyboard navigation, disabled
  options, focus restoration, dismissal, and ARIA relationships stay delegated
  to the directive suite.
time: 2026-07-24T10:00:06.000Z
custom:
  migration: >-
    Replace `<hell-combobox-basic [options]="...">` with the `[hellCombobox]`
    directive suite, drive filtering through `hellSearchResource` (local
    ranking or async sources with debounce, cancellation, and stale-result
    protection), and render each result as a projected `hellComboboxOption`.
    Compose `hell-ui/chip` primitives for multiple-selection chips, and rename
    the per-module value types to core's Pick Value family:
    `HellComboboxSingleValue` → `HellPickSingleValue`,
    `HellComboboxMultipleValue` → `HellPickMultipleValue`, and
    `HellComboboxValue` → `HellPickValue` from `hell-ui/core`.
