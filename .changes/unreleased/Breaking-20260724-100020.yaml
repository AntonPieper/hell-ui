kind: Breaking
body: >-
  The `hell-ui/tag` entry point folds into `hell-ui/chip`. `HellTag` is
  replaced by a static chip host with the same six variants, `HellBadge` and
  `HellKbd` move to `hell-ui/chip` unchanged, and `HellTagVariant` becomes
  `HellChipVariant`.
time: 2026-07-24T10:00:20.000Z
custom:
  migration: >-
    Replace `hellTag` hosts with `<span hellChip variant="...">`, import
    Badge and Kbd from `hell-ui/chip`, rename `HellTagVariant` to
    `HellChipVariant`, and repoint `hell-ui/tag/styles.css` imports to the
    chip stylesheet.
