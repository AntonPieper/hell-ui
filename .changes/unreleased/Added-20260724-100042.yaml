kind: Added
body: >-
  The `hell-ui/page-header` Composite: slot-based page chrome with `root`,
  `leading`, `titleGroup`, `title`, `meta`, `description`, and `toolbar`
  Public Parts, all filled by content projection of real components rather
  than a config-array API. The marked title becomes the page's heading at a
  configurable level, and the optional `hell-page-header-back` affordance
  renders a ghost icon button that emits a `back` event while routing stays
  with the app.
