kind: Added
body: >-
  The `hell-ui/chip` Mixed Entry Point: `hellChip` renders span, button, or
  anchor pills with `variant`/`size` state attributes and a `(remove)` output;
  `hellChipRemove` is a real sibling remove button with a built-in × glyph and
  an accessible name derived from the chip's text; `hellChipSet` provides one
  roving tab stop with Arrow/Home/End focus, Delete/Backspace removal, and
  focus continuity after removal; and `input[hellChipInput]` connects a
  consumer-owned editable input to its enclosing set. Removal is event-only —
  the consumer owns the collection.
