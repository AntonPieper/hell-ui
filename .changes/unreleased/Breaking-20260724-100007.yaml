kind: Breaking
body: >-
  Date Input is now a directive on your own native input:
  `input[hellDateInput]` replaces the owned `<hell-date-input>` component and
  its embedded picker trigger. Parsing, formatting, validation, and forms
  behavior carry over.
time: 2026-07-24T10:00:07.000Z
custom:
  migration: >-
    Author `<input hellDateInput>` and replace `[date]`/`(dateChange)` with
    `[value]`/`(valueChange)`. Move `inputId`, `name`, `placeholder`, and
    other native attributes onto the input, and compose a Control Group
    action, Popover, and Date Picker when you need a calendar. In tests,
    replace `getInputValue()`/`setInputValue()` with `getValue()`/`setValue()`;
    `openPicker()` is gone.
