kind: Added
body: >-
  The menu trigger conforms to the Anchored Surface Contract: it gains a
  reactive `open` signal, an `(openChange)` boolean output, `show()`, and an
  `exportAs` matching the directive name. Menu closing stays engine-owned
  through item selection, outside clicks, and Escape.
