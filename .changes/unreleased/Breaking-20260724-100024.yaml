kind: Breaking
body: >-
  Two directive homes moved so entry points match their semantics:
  `HellNativeSelect` now exports from `hell-ui/select` instead of
  `hell-ui/input`, and the `hell-ui/search` entry point is removed —
  `HellSearch`, `HellSearchClear`, and `HELL_SEARCH_IMPORTS` now export from
  `hell-ui/input`. Selectors, behavior, recipes, and styling contracts are
  unchanged.
