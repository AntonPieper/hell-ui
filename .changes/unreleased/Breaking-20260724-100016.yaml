kind: Breaking
body: >-
  The flyout entry point is retired: a popover with `[trapFocus]="false"` is
  the anchored, non-modal, light-dismiss surface. The popover trigger gains
  `trapFocus` (default `true`), `anchor`, `boundary`, and a reactive `open`
  signal, and `closeOnOutsideClick` also governs outside-focus dismissal for
  non-modal panels.
time: 2026-07-24T10:00:16.000Z
custom:
  migration: >-
    Replace `HellFlyout`/`HellFlyoutTrigger` with the popover pair plus
    `[trapFocus]="false"`, replace `closeOnOutsideInteraction` with
    `closeOnOutsideClick`, widen the light-dismiss region with `boundary`
    where nested consumer surfaces should count as inside, and import the
    popover stylesheet instead of the flyout one. `#ref="ngpPopover"` template
    references no longer resolve on `[hellPopover]` panels.
