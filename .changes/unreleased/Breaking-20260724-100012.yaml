kind: Breaking
body: >-
  The `hell-ui/drop-zone` entry point and its stylesheet are removed; file
  acquisition is now the `hell-ui/file-picker` directive. Upload queues,
  progress, retry, and server work stay in your app.
time: 2026-07-24T10:00:12.000Z
custom:
  migration: >-
    Replace `[hellDropzone]` with `[hellFilePicker]`, `(files)` with
    `(selection)`, and the `data-active` drag hook with `data-dragging`. Use
    `open()` instead of a bound native input for browsing, import
    `hell-ui/file-picker/styles.css`, and switch tests to
    `HellFilePickerHarness`.
