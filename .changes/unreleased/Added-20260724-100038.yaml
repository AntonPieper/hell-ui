kind: Added
body: >-
  New `hell-ui/empty-state` entry point: `hell-empty-state` renders a centered
  glyph, title, description, and actions layout with overridable content and a
  configurable heading level. Ready-made copy for no-data, no-results, error,
  and forbidden states ships as plain localizable data.
