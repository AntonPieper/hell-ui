kind: Breaking
body: >-
  The date, time, and number input adapters now share one core contract,
  `HellTypedInputAdapter`, with common parse-result helpers. The
  per-entry-point standalone parse/format helpers and `Hell*InputParseResult`
  aliases are removed.
time: 2026-07-24T10:00:09.000Z
custom:
  migration: >-
    Rename a custom date adapter's `coerce` hook to `normalize`, let the time
    adapter's `format` accept `null` (return an empty string), and build
    parse results with the core constructors. The `provideHell<X>InputAdapter`
    registration functions and default adapter exports are unchanged.
