kind: Added
body: >-
  New optional `hell-ui/features/filter-builder` entry point:
  `hell-filter-builder` edits typed filter expressions against fields you
  describe, rendering each value editor from your own templates. It handles
  keyboard interaction, focus, and announcements; your app owns the filter
  model, rendering, and validation.
