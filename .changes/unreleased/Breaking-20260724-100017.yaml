kind: Breaking
body: >-
  Styling is one consumer contract: `ui` Part Style Maps. The legacy Style
  Opt-Out is gone — the `unstyled` inputs and `HellStyleable` base are removed
  everywhere, including avatar group and the PDF viewer — the Part-Class
  Pipeline plumbing (`hellPartStyler`, its types, `HellRecipe`, the configured
  `hellTwMerge`, and the card/separator recipe constants) is package-internal,
  the information-free single-part `Hell<Module>Part`/`Hell<Module>Ui` aliases
  are removed, and the dead `.hell-button` legacy helper rule is deleted from
  the button stylesheet.
time: 2026-07-24T10:00:17.000Z
custom:
  migration: >-
    Replace `unstyled` opt-outs with `ui` part refinements, and replace
    removed recipe-constant reads with your own class strings or the rendered
    `data-slot` element's classes. If you need a Tailwind class merge,
    configure `tailwind-merge` in your app — Hell's merge configuration is not
    public API. Annotate single-part `ui` values as `HellUi<'root'>` or drop
    the annotation; multi-part unions such as `HellToasterPart` remain
    exported. Replace `class="hell-button"` with the `hellButton` directive.
