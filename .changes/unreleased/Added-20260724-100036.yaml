kind: Added
body: >-
  The `hell-ui/alert` Styled Primitive: a persistent inline messaging surface
  with `info`/`success`/`warning`/`danger` variants colored through Semantic
  Theme Tokens, a replaceable default per-variant glyph, projected title,
  description, and actions directives, and an opt-in `hellAlertDismiss` button
  with a built-in × glyph and Label Contract name that emits `dismissed` while
  the consumer owns visibility. Alerts carry no live-region semantics by
  default.
time: 2026-07-24T10:00:36.000Z
