kind: Added
body: >-
  The `hell-ui/confirm` entry point exposes one Prompt Interface through
  `injectHellPrompt()`: `confirm()` opens an accessible modal — or an anchored
  popconfirm via `{ anchor, placement }` — and `choose<TValue>()` handles
  typed N-way decisions. Prompts always resolve (Escape, backdrop, and cancel
  resolve `false` or a dismiss-equivalent value), modal calls queue, anchored
  prompts are singleton, destructive and countdown-gated actions start focus
  on cancel, and default strings sit behind the Label Contract.
