kind: Breaking
body: >-
  `hell-ui/resizable` no longer exposes the root registry, measurement,
  constraint, and sizing methods or the pane measurement and direct sizing
  methods; that coordination stays behind an internal controller. Resize
  behavior is unchanged.
time: 2026-07-24T10:00:25.000Z
custom:
  migration: >-
    Compose the public `[hellResizablePane]` and `[hellResizableHandle]`
    directives through their documented inputs and native pointer/keyboard
    interaction instead of calling controller methods.
