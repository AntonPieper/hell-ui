kind: Breaking
body: >-
  `size` inputs narrowed to exactly the sizes their recipes style:
  `HellDialog` accepts `'sm' | 'md' | 'lg' | 'xl'` and `HellSlider` accepts
  `'sm' | 'md' | 'lg'`. The removed values previously type-checked but
  silently rendered the base `md` visuals.
