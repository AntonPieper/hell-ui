kind: Added
body: >-
  More granular Public Parts, all styleable through the existing `ui` maps:
  `HellAvatar` gains `image` and `fallback`, `HellCheckbox` gains `indicator`,
  `HellAudioPlayer` gains `captionsText`, and `HellPaginationStrip` gains
  `control`. The TanStack table shell adopts the Part Style Map contract:
  `HellTanStackTable` exposes `root`, `toolbar`, `footer`, and `scrollport`
  and `HellTanStackPagination` exposes `root` and `pageSize`, with camelCase
  `data-slot` values replacing the former kebab-case markers and the private
  `.hell-tanstack-*` host classes removed.
