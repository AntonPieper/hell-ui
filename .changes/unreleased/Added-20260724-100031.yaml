kind: Added
body: >-
  The narrow `hell-ui/time-picker` Composite: `hell-time-picker` owns
  structured `HellTimeValue | null` selection, optional seconds, fixed clock
  bounds, segmented keyboard navigation, minute presets, accessibility labels,
  and an eleven-part Part Style Map, without taking on parsing, forms, field,
  trigger, or Popover APIs. Compose it with a Time Input, Control Group
  action, and Popover when segmented selection is useful.
