kind: Breaking
body: >-
  The owned `hell-ui/split-view` component is replaced by the
  projection-first `hell-ui/master-detail` controller: you author the root,
  panes, and back button yourself. The controlled `detailOpen` model and
  `compactBelow` breakpoint remain, and a readonly `compact()` signal is
  added.
time: 2026-07-24T10:00:11.000Z
custom:
  migration: >-
    Replace `<hell-split-view>` and its templates with the
    `HELL_MASTER_DETAIL_IMPORTS` directives over your own markup. Use
    Resizable panes for sizing, ordinary Toolbar or Pagination controls for
    item navigation, and each directive's `ui` map for styling. Import
    `hell-ui/master-detail/styles.css` plus the stylesheets of composed
    primitives.
