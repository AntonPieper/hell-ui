kind: Changed
body: >-
  Hell's duration-token-driven transitions and entrance animations now
  collapse under `prefers-reduced-motion: reduce`, and Spinner, Skeleton, and
  Audio Player disable their keyframe motion locally. The shared token
  stylesheet deliberately leaves consumer and third-party `[data-slot]`
  elements untouched.
