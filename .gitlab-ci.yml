workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

stages:
  - validate

default:
  image: node:22-bookworm-slim
  interruptible: true
  timeout: 10m
  before_script:
    - corepack enable
    - pnpm config set store-dir .pnpm-store
    - pnpm run ci:install
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store/
      - .angular/cache/
      - dist/

static:
  stage: validate
  script:
    - pnpm run ci:test:static

unit:
  stage: validate
  script:
    - pnpm run ci:test:unit
  coverage: '/CI coverage lines: ([0-9.]+)%/'
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - test-results/
      - coverage/
    reports:
      junit: test-results/vitest-junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml

package-consumer:
  stage: validate
  needs:
    - job: build
      artifacts: true
  parallel:
    matrix:
      - PACKAGE_CONSUMER_GROUP: core
        PACKAGE_CONSUMER_SCENARIOS: root-core,core,testing
      - PACKAGE_CONSUMER_GROUP: primitive-foundations
        PACKAGE_CONSUMER_SCENARIOS: primitives-css,button-unstyled
      - PACKAGE_CONSUMER_GROUP: button
        PACKAGE_CONSUMER_SCENARIOS: button
      - PACKAGE_CONSUMER_GROUP: composite-foundations
        PACKAGE_CONSUMER_SCENARIOS: composites-css,app-shell
      - PACKAGE_CONSUMER_GROUP: audio
        PACKAGE_CONSUMER_SCENARIOS: audio-player,audio-transcript
      - PACKAGE_CONSUMER_GROUP: features
        PACKAGE_CONSUMER_SCENARIOS: code-editor,pdf-viewer
      - PACKAGE_CONSUMER_GROUP: table-core
        PACKAGE_CONSUMER_SCENARIOS: table,no-legacy-alias
      - PACKAGE_CONSUMER_GROUP: table-tanstack-virtual
        PACKAGE_CONSUMER_SCENARIOS: table-tanstack,table-tanstack-virtual
  variables:
    HELL_PACKAGE_CONSUMER_SKIP_BUILD: "1"
  script:
    - pnpm run ci:ensure:build:lib
    - HELL_PACKAGE_CONSUMER_SCENARIOS="${PACKAGE_CONSUMER_SCENARIOS}" pnpm run ci:test:package-consumer

build:
  stage: validate
  script:
    - pnpm run ci:ensure:build:lib
    - pnpm run ci:ensure:build:docs
    - pnpm run ci:test:api-report:prepared
  artifacts:
    expire_in: 14 days
    paths:
      - dist/

e2e:
  stage: validate
  image: mcr.microsoft.com/playwright:v1.59.1-noble
  needs:
    - job: build
      artifacts: true
  parallel:
    matrix:
      - PLAYWRIGHT_GROUP:
          - aria-snapshots-foundations
          - aria-snapshots-overlays-data
          - docs-smoke-foundations
          - docs-smoke-surfaces
          - controls-a11y
          - date-selection-a11y
          - overlays-keyboard
          - table-resize
          - behavior-regressions
  variables:
    HOME: /root
    HELL_E2E_PROJECTS: ci
    PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
  script:
    - pnpm run ci:ensure:build:lib
    - pnpm run ci:test:e2e --workers=8 --project="chromium-${PLAYWRIGHT_GROUP}" --project="firefox-${PLAYWRIGHT_GROUP}" --project="webkit-${PLAYWRIGHT_GROUP}"
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - test-results/playwright-report.json
      - test-results/playwright-html/
      - test-results/playwright/
