workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

stages:
  - test
  - build

default:
  image: node:22-bookworm-slim
  interruptible: true
  timeout: 20m
  before_script:
    - corepack enable
    - pnpm config set store-dir .pnpm-store
    - node tools/package-manager.mjs run ci:install
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store/

test:
  stage: test
  script:
    - node tools/package-manager.mjs run ci:playwright
    - node tools/package-manager.mjs run ci:test
  coverage: '/CI coverage lines: ([0-9.]+)%/'
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - test-results/
      - coverage/
    reports:
      junit: test-results/vitest-junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml

build:
  stage: build
  needs:
    - job: test
      artifacts: false
  script:
    - node tools/package-manager.mjs run ci:build
  artifacts:
    expire_in: 14 days
    paths:
      - dist/
