# Change Fragment source configuration (ADR 0003).
#
# `pnpm change` is the only contributor-facing fragment creation command.
# Changie's batch/merge primitives stay private to Release Preparation
# tooling; nothing here commits, tags, pushes, or publishes.
#
# The root CHANGELOG.md is the generated Release Changelog: Changie merge
# assembles the header plus every Released Version Notes record under
# `.changes/`, newest first. `pnpm test:changelog` regenerates the aggregate
# in an isolated workspace and requires byte-for-byte equality, so the
# aggregate is never edited by hand.
#
# The five-kind Consumer Change schema is deliberately closed: removals are
# recorded as Breaking and deprecations as Changed. Concision is an authoring
# and review responsibility, so prompts keep minLength 1 and no hard character
# limits. Fragments carry no issue, pull-request, author, component, project,
# or validation-evidence fields.
changesDir: .changes
unreleasedDir: unreleased
headerPath: header.tpl.md
changelogPath: CHANGELOG.md
versionExt: md
versionFormat: '## [{{.Version}}] - {{.Time.Format "2006-01-02"}}'
kindFormat: '### {{.Kind}}'
changeFormat: '- {{.Body}}'
# One blank line between the merged changelog header and each release entry
# (beforeChangelogVersion applies at merge time), plus batch-time spacing so a
# generated Released Version Notes record reads like the hand-authored
# baseline: a blank line before every kind heading and change bullet, and one
# trailing newline so merged releases stay separated by exactly one blank
# line.
newlines:
  beforeChangelogVersion: 1
  beforeKind: 1
  beforeChange: 1
  endOfVersion: 1
body:
  minLength: 1
kinds:
  # Breaking and Added select a minor release before 1.0.0; Changed, Fixed,
  # and Security select a patch release. Release Stage Promotion (for example
  # 1.0.0) is always an explicit decision, never inferred from a fragment.
  - label: Breaking
    format: '### Breaking changes'
    auto: minor
    changeFormat: |-
      - {{.Body}}

        Migration: {{.Custom.migration}}
    additionalChoices:
      - key: migration
        type: string
        label: Migration
        minLength: 1
  - label: Added
    auto: minor
  - label: Changed
    auto: patch
  - label: Fixed
    auto: patch
  - label: Security
    auto: patch
